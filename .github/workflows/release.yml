name: Build Desktop Distribution

on:
  push:
    branches: [ desktop_publish ]
  pull_request:
    branches: [ desktop_publish ]
  workflow_dispatch:

jobs:
  # 1️⃣ Self-hosted Ubuntu
  ubuntu_build:
    name: Build on Self-Hosted Ubuntu
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release Distribution
        env:
          SYNC_SERVER_URL: ${{ secrets.SYNC_SERVER_URL }}
          SYNC_SERVER_TOKEN: ${{ secrets.SYNC_SERVER_TOKEN }}
          IS_RELEASE: ${{ secrets.IS_RELEASE }}
        run: ./gradlew :shared:packageReleaseDistributionForCurrentOS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: shared/build/compose/binaries/**/*

  # 2️⃣ Windows and macOS (GitHub-hosted)
  matrix_build:
    name: Build on GitHub Hosted Runners
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Release Distribution
        env:
          SYNC_SERVER_URL: ${{ secrets.SYNC_SERVER_URL }}
          SYNC_SERVER_TOKEN: ${{ secrets.SYNC_SERVER_TOKEN }}
          IS_RELEASE: ${{ secrets.IS_RELEASE }}
        run: ./gradlew :shared:packageReleaseDistributionForCurrentOS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: shared/build/compose/binaries/**/*