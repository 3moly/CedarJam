name: Build Desktop Distributions

on:
  push:
    branches: [ desktop_publish ]
  pull_request:
    branches: [ desktop_publish ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install JetBrains Runtime (JBR) 21
      - name: Setup JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          cache: gradle

      - name: Verify Java
        run: java -version

      # Make gradlew executable on Unix systems
      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Release Distribution
        run: ./gradlew :shared:packageReleaseDistributionForCurrentOS
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: shared/build/compose/binaries/**/*