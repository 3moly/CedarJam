name: Build Desktop Distribution (Ubuntu Self-Hosted 2)

on:
  push:
    branches: [ desktop_publish ]
  pull_request:
    branches: [ desktop_publish ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Self-Hosted Ubuntu
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          cache: gradle

      - name: Verify Java
        run: java -version

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release Distribution
        env:
          SYNC_SERVER_URL: ${{ secrets.SYNC_SERVER_URL }}
          SYNC_SERVER_TOKEN: ${{ secrets.SYNC_SERVER_TOKEN }}
          IS_RELEASE: ${{ secrets.IS_RELEASE }}
        run: ./gradlew :shared:packageReleaseDistributionForCurrentOS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: shared/build/compose/binaries/**/*
