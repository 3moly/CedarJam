name: Build Linux ARM64

on:
  push:
    branches: [ linuxarm64 ]
  pull_request:
    branches: [ linuxarm64 ]
  workflow_dispatch:

jobs:
  matrix_build:
    name: Build on GitHub Hosted Runners
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ "ubuntu-24.04-arm" ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Release Distribution
        env:
          SYNC_SERVER_URL: ${{ secrets.SYNC_SERVER_URL }}
          SYNC_SERVER_TOKEN: ${{ secrets.SYNC_SERVER_TOKEN }}
          IS_RELEASE: ${{ secrets.IS_RELEASE }}
        run: ./gradlew :shared:packageReleaseDistributionForCurrentOS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: shared/build/compose/binaries/**/*