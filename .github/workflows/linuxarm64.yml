name: Build Linux ARM64

on:
  push:
    branches: [ linuxarm64 ]
  pull_request:
    branches: [ linuxarm64 ]
  workflow_dispatch:

jobs:
  matrix_build:
    name: Build on GitHub Hosted Runners
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest, "ubuntu-24.04-arm" ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          cache: gradle

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ matrix.os }}-gradle
          enableCrossOsArchive: true

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          sudo apt-get install -y \
            fakeroot \
            dpkg-dev \
            rpm \
            binutils

      - name: Build Release Distribution
        env:
          SYNC_SERVER_URL: ${{ secrets.SYNC_SERVER_URL }}
          SYNC_SERVER_TOKEN: ${{ secrets.SYNC_SERVER_TOKEN }}
          IS_RELEASE: ${{ secrets.IS_RELEASE }}
        run: ./gradlew :desktopApp:packageReleaseDistributionForCurrentOS
      - name: Upload jpackage logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: jpackage-logs-${{ matrix.os-name || runner.os }}
          path: desktopApp/build/compose/logs/**/*.txt
          retention-days: 5

      - name: Release Gradle to unlock cache files
        shell: bash
        run: |
          ./gradlew -stop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os-name }}-${{ runner.os }}
          path: desktopApp/build/compose/binaries/**/*